<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>今日のランチ提案</title>
</head>
<body>

  <h1>今日のランチ何にする？</h1>
  <button onclick="suggestLunch()">ランチを決める</button>
  <div id="result">ここに表示されます</div>

  <script>
    const lunches = [
      "ラーメン（無敵家）｜ガッツリ濃厚で満足感◎",
      "つけ麺（やすべえ）｜お腹いっぱい食べたい日に",
      "カレー（CoCo壱）｜安定のうまさで迷ったらこれ",
      "スープカレー（SHANTi）｜野菜たっぷりでヘルシー",
      "ハンバーグ（グリル百舌）｜肉汁たっぷりでご褒美ランチ",
      "パスタ（洋麺屋五右衛門）｜ちょっとおしゃれにいきたい時",
      "オムライス（ラケル）｜ふわとろ系で気分上げたい日に",
      "寿司（すしざんまい）｜ちょっと贅沢したい日に",
      "回転寿司（くら寿司）｜サクッと食べたい時におすすめ",
      "焼肉（牛角）｜スタミナつけたい日に最適",
      "焼き鳥（鳥貴族）｜コスパ重視で満足度高め",
      "定食（大戸屋）｜バランスよく健康的に",
      "とんかつ（和幸）｜サクサクで満腹確定",
      "唐揚げ定食（からやま）｜がっつり系の王道",
      "うどん（丸亀製麺）｜軽めに済ませたい時",
      "そば（ゆで太郎）｜さっぱりしたい日にぴったり",
      "牛丼（吉野家）｜時間ない時の最強選択",
      "ハンバーガー（マクドナルド）｜手軽にサクッと",
      "サンドイッチ（サブウェイ）｜ヘルシー志向ならこれ",
      "カフェランチ（コメダ珈琲）｜ゆっくりしたい時に",
      "パン屋ランチ（ヴィ・ド・フランス）｜軽く済ませたい日に",
      "韓国料理（ビビンバ）｜ピリ辛で食欲アップ",
      "中華（餃子の王将）｜がっつり＆コスパ良し",
      "麻辣湯｜刺激が欲しい日におすすめ",
      "タコライス｜ちょっと気分変えたい日に",
      "ガパオライス｜エスニック気分でリフレッシュ",
      "ローストビーフ丼｜ちょっと贅沢ランチ",
      "海鮮丼｜さっぱりだけど満足感あり",
      "親子丼｜優しい味でほっと一息",
      "油そば｜ジャンキー欲満たしたい日に",
      "家系ラーメン｜濃いめでパワーチャージ",
      "坦々麺｜ピリ辛好きにはたまらない"
    ];

    function suggestLunch() {
      const randomIndex = Math.floor(Math.random() * lunches.length);
      const [menu, comment] = lunches[randomIndex].split("｜");
      document.getElementById("result").innerHTML =
        `<strong>${menu}</strong><br><span style="font-size:16px;color:#666;">${comment}</span>`;
    }
  </script>

</body>
</html>
